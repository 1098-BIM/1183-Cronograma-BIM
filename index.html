<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cronograma BIM — HIAE 1183 | Minerbo-Fuchs</title>
<style>
/* ============================================================
   ESTILO DO PAINEL — layout FIXO 1920x1080 para Smart TV antiga.
   Sem flex-gap, sem grid, sem vw/vh. Usa px, float e inline-block.
   Cores escritas direto (sem var) para máxima compatibilidade.
   ============================================================ */
* { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; height:100%; overflow:hidden; }
body {
  font-family:"Segoe UI", Arial, sans-serif;
  background:#eef2fa;
  color:#0e1730;
  position:relative;
}
.clearfix:after { content:""; display:block; clear:both; }

.stage { width:1920px; height:1080px; padding:16px 20px; background:#eef2fa; }

/* ---------- Topbar ---------- */
.topbar {
  height:92px; background:#0c1b47; color:#fff;
  border-radius:16px; padding:14px 22px; margin-bottom:14px; position:relative;
}
.topbar .brand { float:left; }
.topbar .mark {
  display:inline-block; vertical-align:middle; background:#fff;
  border-radius:10px; padding:8px 11px; height:62px; margin-right:16px;
}
.topbar .mark img { height:46px; width:auto; display:block; }
.topbar .brand .txt { display:inline-block; vertical-align:middle; }
.topbar h1 { font-size:30px; font-weight:800; line-height:1.1; }
.topbar .sub { font-size:14px; color:#aebbe6; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; margin-top:4px; }
.clockbox { float:right; text-align:right; }
.clockbox .time { font-size:40px; font-weight:800; line-height:1; }
.clockbox .date { font-size:16px; color:#aebbe6; font-weight:600; margin-top:4px; text-transform:capitalize; }
.clockbox .live { font-size:12px; color:#9fe6a8; font-weight:700; letter-spacing:1px; margin-top:5px; }
.clockbox .live .dot { display:inline-block; width:9px; height:9px; border-radius:50%; background:#39d353; margin-right:5px; vertical-align:middle; }

/* ---------- KPIs (5 colunas) ---------- */
.kpis { height:118px; margin-bottom:14px; }
.kpi {
  float:left; width:360px; height:118px; margin-right:15px;
  background:#fff; border:1px solid #e3e8f3; border-radius:14px;
  padding:14px 16px 14px 22px; position:relative; overflow:hidden;
}
.kpi.last { margin-right:0; }
.kpi:before { content:""; position:absolute; left:0; top:0; bottom:0; width:7px; background:#1f47b8; }
.kpi.k-red:before { background:#d8342b; }
.kpi.k-amber:before { background:#e5a000; }
.kpi.k-green:before { background:#2e9e3f; }
.kpi.k-orange:before { background:#f07c1e; }
.kpi .label { font-size:13px; color:#64708f; font-weight:700; text-transform:uppercase; letter-spacing:1px; }
.kpi .value { font-size:42px; font-weight:800; line-height:1.05; margin:4px 0; }
.kpi .foot { font-size:13px; color:#64708f; font-weight:600; }
.kpi.k-red .value { color:#d8342b; }
.kpi.k-amber .value { color:#e5a000; }
.kpi.k-green .value { color:#2e9e3f; }
.kpi.k-orange .value { color:#f07c1e; }
.kpi.k-blue .value { color:#1f47b8; }

/* ---------- main area: esquerda (feed) + direita (2 painéis) ---------- */
.main { height:706px; }
.col-left { float:left; width:1130px; height:706px; margin-right:16px; }
.col-right { float:left; width:716px; height:706px; }

.panel { background:#fff; border:1px solid #e3e8f3; border-radius:16px; overflow:hidden; }
.panel .ph { height:52px; padding:14px 18px; border-bottom:1px solid #e3e8f3; }
.panel .ph h2 { float:left; font-size:19px; font-weight:800; color:#142a6b; }
.panel .ph .tag { float:right; font-size:12px; font-weight:700; color:#64708f; text-transform:uppercase; letter-spacing:1px; margin-top:4px; }

.col-left .panel { height:706px; }
.col-right .panel-top { height:345px; margin-bottom:16px; }
.col-right .panel-bot { height:345px; }

/* feed */
.feed-body { height:654px; overflow:hidden; }
.row { height:81px; padding:13px 18px; border-bottom:1px solid #e3e8f3; position:relative; }
.row .proj {
  float:left; width:74px; height:54px; line-height:36px; text-align:center;
  font-weight:800; color:#142a6b; font-size:19px; background:#f3f6fd;
  border:1px solid #e3e8f3; border-radius:9px; padding:8px 0; margin-right:16px;
}
.row .desc { float:left; width:760px; }
.row .desc .t { font-size:17px; font-weight:700; line-height:1.2; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.row .desc .m { font-size:13px; color:#64708f; font-weight:600; margin-top:5px; }
.row .desc .m-date { font-weight:800; color:#142a6b; font-size:15px; margin-left:6px; text-transform:capitalize; }
.row .desc .reprog-tag { display:inline-block; font-size:11px; font-weight:800; text-transform:uppercase; letter-spacing:.5px; background:#fde7d6; color:#c2540a; padding:2px 8px; border-radius:999px; margin-left:8px; }
.row .desc .reprog-old { color:#b0392f; font-size:13px; font-weight:700; margin-left:5px; }
.row .desc .reprog-old s { opacity:.85; }
.row .chip { display:inline-block; font-size:12px; font-weight:800; padding:3px 9px; border-radius:999px; text-transform:uppercase; margin-right:6px; }
.row .chip.entrega { background:#e9eefb; color:#1f47b8; }
.row .chip.dr { background:#eaf6ec; color:#2e9e3f; }
.row .chip.apres { background:#eef0ff; color:#4338ca; }
.row .chip.envio { background:#fdeede; color:#f07c1e; }
.row .when { float:right; text-align:right; width:150px; }
.row .when .big { font-size:30px; font-weight:800; line-height:1; }
.row .when .small { font-size:13px; font-weight:700; color:#64708f; margin-top:3px; }

.row.urgent { background:#fbe8e7; }
.row.urgent .when .big { color:#d8342b; }
.row.urgent .proj { border-color:#d8342b; color:#d8342b; }
.row.soon { background:#fdf4dd; }
.row.soon .when .big { color:#e5a000; }
.row.today { background:#e9f8ec; }
.row.today .when .big { color:#2e9e3f; }

/* progress */
.prog { padding:14px 18px; }
.pitem { margin-bottom:13px; }
.pitem .pl { margin-bottom:6px; }
.pitem .pl .nm { float:left; width:480px; font-size:15px; font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.pitem .pl .pct { float:right; font-size:14px; color:#64708f; font-weight:700; }
.bar { clear:both; height:11px; background:#e2e9f6; border-radius:999px; overflow:hidden; }
.bar i { display:block; height:11px; border-radius:999px; background:#2e9e3f; }
.pitem.is-late .bar i { background:#f07c1e; }

/* stats (2x2) */
.statgrid { padding:16px 18px; }
.sbox { float:left; width:330px; height:118px; margin:0 18px 14px 0; border:1px solid #e3e8f3; border-radius:12px; padding:16px; }
.sbox.r { margin-right:0; }
.sbox .n { font-size:40px; font-weight:800; line-height:1; }
.sbox .l { font-size:13px; font-weight:700; color:#64708f; text-transform:uppercase; margin-top:6px; }
.sbox.s-green { background:#eaf6ec; } .sbox.s-green .n { color:#2e9e3f; }
.sbox.s-blue { background:#e9eefb; } .sbox.s-blue .n { color:#1f47b8; }
.sbox.s-amber { background:#fdf4dd; } .sbox.s-amber .n { color:#e5a000; }
.sbox.s-red { background:#fbe8e7; } .sbox.s-red .n { color:#d8342b; }

/* ticker */
.ticker { height:52px; background:#0c1b47; border-radius:14px; margin-top:14px; overflow:hidden; position:relative; }
.ticker .lab { float:left; height:52px; line-height:52px; background:#f07c1e; padding:0 18px; font-weight:800; font-size:14px; text-transform:uppercase; letter-spacing:1px; color:#fff; }
.ticker.calm .lab { background:#2e9e3f; }
.ticker .track { height:52px; line-height:52px; overflow:hidden; white-space:nowrap; }
.ticker .move { display:inline-block; padding-left:30px; color:#fff; font-size:17px; font-weight:600; }
.ticker .move span { margin-right:48px; }
.ticker .move b { color:#ffd27a; font-weight:800; }

</style>
</head>

function labelFor(key){
  for (var i=0;i<TYPES.length;i++){ if (TYPES[i].key===key) return TYPES[i]; }
  return {key:key,name:key,color:"#64708f",bg:"#eef2fa",ico:"\u25CF",role:""};
}
function isEntregaType(key){ var t=labelFor(key); return t.role==="entrega"; }
function isDoneType(key){ var t=labelFor(key); return t.role==="done"; }
var MONTHS = ["janeiro","fevereiro","mar\u00e7o","abril","maio","junho","julho","agosto","setembro","outubro","novembro","dezembro"];
var WEEKDAYS = ["domingo","segunda-feira","ter\u00e7a-feira","quarta-feira","quinta-feira","sexta-feira","s\u00e1bado"];
var WEEKDAYS_ABBR = ["dom","seg","ter","qua","qui","sex","s\u00e1b"];

function pad2(n){ n = String(n); return n.length < 2 ? "0" + n : n; }
function esc(s){ s = (s == null ? "" : String(s)); return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
function parseDMY(s){ var pa = String(s).split("/"); return new Date(YEAR, parseInt(pa[1],10)-1, parseInt(pa[0],10)); }
function startOfDay(dt){ return new Date(dt.getFullYear(), dt.getMonth(), dt.getDate()); }
function daysBetween(a,b){ return Math.round((startOfDay(b)-startOfDay(a))/86400000); }
function fmtShort(dt){ return pad2(dt.getDate())+"/"+pad2(dt.getMonth()+1); }

function buildEvents(now){
  var list=[], i, j;
  for (i=0;i<PROJECTS.length;i++){
    var p=PROJECTS[i];
    for (j=0;j<p.events.length;j++){
      var ev=p.events[j]; var date=parseDMY(ev.d);
      list.push({proj:p.id,desc:p.desc,type:ev.t,date:date,dd:daysBetween(now,date),raw:ev.d,history:ev.history||null});
    }
  }
  return list;
}
function projectProgress(p, now){
  var dates=[], i;
  for (i=0;i<p.events.length;i++){ dates.push(parseDMY(p.events[i].d)); }
  dates.sort(function(a,b){ return a-b; });
  var hasDone=false, hasEntrega=false, entregaDate=null;
  for (i=0;i<p.events.length;i++){
    if (isDoneType(p.events[i].t)) hasDone=true;
    if (isEntregaType(p.events[i].t)){ hasEntrega=true; entregaDate=parseDMY(p.events[i].d); }
  }
  var isDone = hasDone;
  var start=dates[0], end=dates[dates.length-1], pct;
  if (isDone) pct=100;
  else if (now<=start) pct=0; else if (now>=end) pct=100;
  else pct=Math.round((startOfDay(now)-startOfDay(start))/(startOfDay(end)-startOfDay(start))*100);
  var delivs=[];
  for (i=0;i<p.events.length;i++){ if (isEntregaType(p.events[i].t)||isDoneType(p.events[i].t)) delivs.push(parseDMY(p.events[i].d)); }
  delivs.sort(function(a,b){ return b-a; });
  var lastDeliv = delivs.length ? delivs[0] : end;
  var late = !isDone && now>startOfDay(lastDeliv);
  return {pct:pct,isDone:isDone,late:late,end:end};
}
function byProximity(a,b){ if (a.dd!==b.dd) return a.dd-b.dd; return a.proj<b.proj?-1:(a.proj>b.proj?1:0); }

function render(){
  var now=new Date(), events=buildEvents(now), i, e;
  document.getElementById("clock").innerHTML = pad2(now.getHours())+":"+pad2(now.getMinutes());
  document.getElementById("today").innerHTML = WEEKDAYS[now.getDay()]+", "+now.getDate()+" de "+MONTHS[now.getMonth()]+" de "+now.getFullYear();

  var upcoming=[];
  for (i=0;i<events.length;i++){ e=events[i]; if (!isDoneType(e.type) && e.dd>=0) upcoming.push(e); }
  upcoming.sort(byProximity);

  var next = upcoming.length ? upcoming[0] : null;
  var todayCount=0, wk=0, urgent=0, deliveriesLeft=0;
  for (i=0;i<upcoming.length;i++){ e=upcoming[i];
    if (e.dd===0) todayCount++;
    if (e.dd>=0 && e.dd<=7) wk++;
    if (e.dd>=0 && e.dd<=2) urgent++;
    if (isEntregaType(e.type)) deliveriesLeft++;
  }

  var nextCls = next ? (next.dd<=2?"k-red":(next.dd<=6?"k-amber":"k-green")) : "k-green";
  var nextVal = next ? (next.dd===0?"HOJE":next.dd+(next.dd===1?" dia":" dias")) : "\u2014";
  var nextFoot = next ? (next.proj+" \u00b7 "+labelFor(next.type).name+" \u00b7 "+fmtShort(next.date)) : "tudo entregue";
  var kpis=[
    {cls:nextCls,label:"Pr\u00f3ximo marco",value:nextVal,foot:nextFoot},
    {cls:"k-orange",label:"Esta semana",value:wk,foot:"marcos nos pr\u00f3ximos 7 dias"},
    {cls:"k-red",label:"Aten\u00e7\u00e3o imediata",value:urgent,foot:"em at\u00e9 48 horas"},
    {cls:"k-green",label:"Hoje",value:todayCount,foot:todayCount?"marcos para hoje":"nenhum marco hoje"},
    {cls:"k-blue",label:"Entregas restantes",value:deliveriesLeft,foot:"modelos a finalizar"}
  ];
  var kpiHtml="";
  for (i=0;i<kpis.length;i++){ var k=kpis[i];
    var lastCls = (i===kpis.length-1) ? " last" : "";
    kpiHtml += '<div class="kpi '+k.cls+lastCls+'"><div class="label">'+k.label+'</div><div class="value">'+k.value+'</div><div class="foot">'+k.foot+'</div></div>';
  }
  document.getElementById("kpis").innerHTML = kpiHtml;

  var feed="", lim=Math.min(8,upcoming.length);
  for (i=0;i<lim;i++){ e=upcoming[i];
    var cls="row", whenBig, whenSmall;
    if (e.dd===0){ cls+=" today"; whenBig="HOJE"; whenSmall="entrega/marco"; }
    else if (e.dd<=2){ cls+=" urgent flash"; whenBig=e.dd; whenSmall=(e.dd===1?"dia restante":"dias restantes"); }
    else if (e.dd<=6){ cls+=" soon"; whenBig=e.dd; whenSmall="dias restantes"; }
    else { whenBig=e.dd; whenSmall="dias restantes"; }
    var L=labelFor(e.type);
    var wd=WEEKDAYS_ABBR[e.date.getDay()];
    var reprog="";
    if (e.history && e.history.length){
      var olds="";
      for (var hi=0; hi<e.history.length; hi++){ olds += (hi?" ":"") + "<s>"+esc(e.history[hi])+"</s>"; }
      reprog = ' <span class="reprog-tag">reprogramado</span> <span class="reprog-old">'+olds+'</span>';
    }
    feed += '<div class="'+cls+'"><div class="proj">'+esc(e.proj)+'</div>'+
            '<div class="desc"><div class="t">'+esc(e.desc)+'</div>'+
            '<div class="m"><span class="chip" style="background:'+L.bg+';color:'+L.color+';">'+L.ico+' '+esc(L.name)+'</span>'+
            ' <span class="m-date">'+fmtShort(e.date)+' \u00b7 '+wd+'</span>'+reprog+'</div></div>'+
            '<div class="when"><div class="big">'+whenBig+'</div><div class="small">'+whenSmall+'</div></div></div>';
  }
  if (!feed){ feed='<div class="row"><div class="desc"><div class="t">Nenhum marco pendente \uD83C\uDF89</div><div class="m">Todos os modelos foram entregues.</div></div></div>'; }
  document.getElementById("feed").innerHTML = feed;

  var prog="", conclCount=0;
  for (i=0;i<PROJECTS.length;i++){ var p=PROJECTS[i]; var pr=projectProgress(p,now);
    if (pr.isDone) conclCount++;
    var icls = pr.isDone?"is-done":(pr.late?"is-late":"");
    var status = pr.isDone?"conclu\u00eddo":(pr.late?"atrasado":(pr.pct>=100?"em entrega":"em andamento"));
    var pctTxt = pr.isDone?("\u2713 "+status):(pr.pct+"% \u00b7 "+status);
    var w = pr.isDone?100:pr.pct;
    prog += '<div class="pitem '+icls+'"><div class="pl"><span class="nm">'+esc(p.id)+' \u2014 '+esc(p.desc)+'</span><span class="pct">'+pctTxt+'</span></div>'+
            '<div class="bar"><i style="width:'+w+'%"></i></div></div>';
  }
  document.getElementById("prog").innerHTML = prog;

  var active = PROJECTS.length - conclCount;
  document.getElementById("stats").innerHTML =
    '<div class="sbox s-blue"><div class="n">'+PROJECTS.length+'</div><div class="l">Projetos totais</div></div>'+
    '<div class="sbox s-green r"><div class="n">'+conclCount+'</div><div class="l">Conclu\u00eddos</div></div>'+
    '<div class="sbox s-amber"><div class="n">'+active+'</div><div class="l">Em andamento</div></div>'+
    '<div class="sbox s-red r"><div class="n">'+urgent+'</div><div class="l">Marcos cr\u00edticos (\u226448h)</div></div>';
  document.getElementById("windowTag").innerHTML = upcoming.length+" marcos restantes";

  var t=document.getElementById("ticker"), lab=document.getElementById("tickerLab"), move=document.getElementById("tickerMove");
  var parts=[], critCount=0;
  for (i=0;i<upcoming.length;i++){ if (upcoming[i].dd<=2) critCount++; }
  if (critCount>0){
    t.className="ticker"; lab.innerHTML="\u26A0 Alertas";
    for (i=0;i<upcoming.length;i++){ e=upcoming[i];
      if (e.dd<=2){ var tx=e.dd===0?"HOJE":(e.dd===1?"AMANH\u00c3":"em "+e.dd+" dias");
        parts.push('<span><b>'+esc(e.proj)+'</b> \u2014 '+labelFor(e.type).name+' <b>'+tx+'</b> ('+fmtShort(e.date)+')</span>');
      }
    }
  } else {
    t.className="ticker calm"; lab.innerHTML="\u2713 No prazo";
    parts.push('<span>Nenhum marco cr\u00edtico nas pr\u00f3ximas 48 horas.</span>');
  }
  for (i=0;i<upcoming.length;i++){ e=upcoming[i];
    if (e.dd>2 && e.dd<=7){ parts.push('<span><b>'+esc(e.proj)+'</b> '+labelFor(e.type).name+' em '+e.dd+' dias ('+fmtShort(e.date)+')</span>'); }
  }
  parts.push('<span>Reuni\u00e3o de DR MF (Design Review) \u2014 acompanhar datas com BIM Manager e Coordena\u00e7\u00e3o de Projeto.</span>');
  move.innerHTML = parts.join("");
}

render();
setInterval(render, 30000);
var lastDay = new Date().getDate();
setInterval(function(){ var d=new Date().getDate(); if (d!==lastDay){ lastDay=d; render(); } }, 60000);

/* AUTO-ATUALIZACAO (ES5 / XMLHttpRequest) */
var CHECK_MINUTES = 30, RELOAD_HOUR = 4, RELOAD_MIN = 0;
function baseUrlNoQuery(){ var h=window.location.href; var i=h.indexOf("#"); if(i>=0)h=h.substring(0,i); var q=h.indexOf("?"); if(q>=0)h=h.substring(0,q); return h; }
function cacheBustedUrl(){ return baseUrlNoQuery()+"?v="+(new Date().getTime()); }
function hardReload(){ window.location.replace(cacheBustedUrl()); }
var __baseline = null;
function fingerprint(txt){ return txt.length+":"+txt.substring(0,4000); }
function checkForUpdate(){
  try {
    var xhr = new XMLHttpRequest();
    xhr.open("GET", cacheBustedUrl(), true);
    xhr.onreadystatechange = function(){
      if (xhr.readyState===4 && xhr.status>=200 && xhr.status<300){
        var fp = fingerprint(xhr.responseText);
        if (__baseline===null){ __baseline=fp; } else if (fp!==__baseline){ hardReload(); }
      }
    };
    xhr.send();
  } catch (err) {}
}
checkForUpdate();
setInterval(checkForUpdate, CHECK_MINUTES*60000);
setInterval(function(){ var now=new Date(); if (now.getHours()===RELOAD_HOUR && now.getMinutes()===RELOAD_MIN){ hardReload(); } }, 60000);

/* ============================================================
   ANIMAÇÕES VIA JAVASCRIPT (Smart TV antiga não roda @keyframes)
   ============================================================ */

/* (1) Ticker rolando: move a faixa para a esquerda continuamente.
   Quando o conteúdo sai todo da tela, reposiciona no início. */
var __tickerX = 0;
function animateTicker(){
  var move = document.getElementById("tickerMove");
  var track = move ? move.parentNode : null;
  if (!move || !track){ return; }
  var moveW = move.offsetWidth;
  var trackW = track.offsetWidth;
  __tickerX -= 2;                       // velocidade (px por passo)
  if (__tickerX < -moveW){ __tickerX = trackW; }   // recomeça da direita
  move.style.marginLeft = __tickerX + "px";
}
setInterval(animateTicker, 30);          // ~33 fps

/* (2) Pisca-pisca dos itens urgentes: alterna uma classe de realce. */
var __blinkOn = false;
function animateBlink(){
  __blinkOn = !__blinkOn;
  var els = document.getElementsByClassName("flash");
  for (var i=0;i<els.length;i++){
    els[i].style.background = __blinkOn ? "#fdd6d3" : "#fbe8e7";
  }
  var dot = document.getElementById("liveDot");
  if (dot){ dot.style.opacity = __blinkOn ? "1" : "0.35"; }
}
setInterval(animateBlink, 700);

/* (3) Auto-ajuste de escala: encaixa o painel (1920x1080) no espaço
   real disponível da janela do navegador da TV, sem zoom manual. */
function fitToScreen(){
  var stage = document.getElementById("stageRoot");
  if (!stage){ return; }
  var availW = (window.innerWidth || document.documentElement.clientWidth);
  var availH = (window.innerHeight || document.documentElement.clientHeight);
  var scale = Math.min(availW/1920, availH/1080);
  if (scale > 1){ scale = 1; }           // nunca amplia além do tamanho real
  // centraliza horizontalmente o painel escalado
  var newW = 1920 * scale;
  var offX = Math.max(0, (availW - newW) / 2);
  stage.style.webkitTransformOrigin = "0 0";
  stage.style.transformOrigin = "0 0";
  stage.style.webkitTransform = "scale(" + scale + ")";
  stage.style.transform = "scale(" + scale + ")";
  stage.style.position = "absolute";
  stage.style.left = offX + "px";
  stage.style.top = "0px";
}
fitToScreen();
window.onresize = fitToScreen;
setInterval(fitToScreen, 3000);          // reaplica (caso a barra do navegador suma/apareça)

/* ============================================================
   TELA CHEIA (fullscreen) — para a TV, sem teclado/F11.
   - tenta entrar em tela cheia automaticamente ao abrir;
   - se o navegador exigir gesto, mostra um botão discreto;
   - o botão some sozinho após alguns segundos;
   - ao entrar/sair, recalcula o auto-ajuste.
   Usa as variações de API (padrão + webkit/ms) por compat.
   ============================================================ */
function fsElement(){
  return document.fullscreenElement || document.webkitFullscreenElement ||
         document.msFullscreenElement || document.mozFullScreenElement || null;
}
function requestFS(){
  var el = document.documentElement;
  try {
    if (el.requestFullscreen) { return el.requestFullscreen(); }
    if (el.webkitRequestFullscreen) { return el.webkitRequestFullscreen(); }
    if (el.webkitRequestFullScreen) { return el.webkitRequestFullScreen(); }
    if (el.msRequestFullscreen) { return el.msRequestFullscreen(); }
    if (el.mozRequestFullScreen) { return el.mozRequestFullScreen(); }
  } catch (e) {}
  return null;
}
function toggleFS(){
  if (fsElement()){
    try {
      if (document.exitFullscreen) document.exitFullscreen();
      else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
      else if (document.msExitFullscreen) document.msExitFullscreen();
      else if (document.mozCancelFullScreen) document.mozCancelFullScreen();
    } catch (e) {}
  } else {
    requestFS();
  }
}

// cria o botão flutuante
var __fsBtn = document.createElement("div");
__fsBtn.id = "fsBtn";
__fsBtn.innerHTML = "\u26F6 Tela cheia";
__fsBtn.style.cssText =
  "position:fixed;top:14px;right:14px;z-index:9999;cursor:pointer;" +
  "background:#0c1b47;color:#fff;font-family:'Segoe UI',Arial,sans-serif;" +
  "font-size:18px;font-weight:700;padding:12px 18px;border-radius:10px;" +
  "box-shadow:0 4px 14px rgba(0,0,0,0.35);opacity:0.92;";
__fsBtn.onclick = function(){ toggleFS(); hideFsBtnSoon(); };
document.body.appendChild(__fsBtn);

var __fsBtnTimer = null;
function showFsBtn(){
  __fsBtn.style.display = "block";
  hideFsBtnSoon();
}
function hideFsBtnSoon(){
  if (__fsBtnTimer){ clearTimeout(__fsBtnTimer); }
  __fsBtnTimer = setTimeout(function(){
    if (fsElement()){ __fsBtn.style.display = "none"; }   // some só se já está em tela cheia
  }, 6000);
}

// recalcula o ajuste quando entra/sai de tela cheia
function onFsChange(){ setTimeout(fitToScreen, 200); if (fsElement()){ hideFsBtnSoon(); } else { __fsBtn.style.display="block"; } }
document.addEventListener("fullscreenchange", onFsChange, false);
document.addEventListener("webkitfullscreenchange", onFsChange, false);
document.addEventListener("msfullscreenchange", onFsChange, false);
document.addEventListener("mozfullscreenchange", onFsChange, false);

// mostra um clique-para-tela-cheia em qualquer toque/clique na tela
document.addEventListener("click", function(){ if (!fsElement()){ requestFS(); hideFsBtnSoon(); } }, false);

// tenta automaticamente ao abrir (alguns navegadores de TV permitem)
setTimeout(function(){ requestFS(); }, 800);
showFsBtn();

</script>
</body>
